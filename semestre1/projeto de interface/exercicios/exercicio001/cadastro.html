<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <h1>Nexus</h1>
    <h2>Cadastre-se</h2>
    <div class="Nome">
        <p>Nome Completo: </p>
        <input type="text" placeholder="Nome Completo">
    </div>
    <div class="email">
        <p>E-mail:</p>
        <input type="text" placeholder="E-mail">
    </div>
    <div class="cpf">
        <p>CPF:</p>
        <input type="text" placeholder="CPF">
    </div>
    <div class="Sexo">
        <p>Sexo:</p>
        <input type="radio" id="masculino" name="opção" value="m">
        <label for="masculino">Masculino</label><br>
        <input type="radio" id="feminino" name="opção" value="f">
        <label for="feminino">Feminino</label><br>
        <input type="radio" id="outro" name="opção" value="o"/>
        <label for="outro">Outro</label>
    </div> <br>

    <div class="estado">
        <label for="estado">Selecione seu estado: </label><br><br>
        <select id="estado">
            <option value="AC">Acre</option>
            <option value="AL">Alagoas</option>
            <option value="AP">Amapá</option>
            <option value="AM">Amazonas</option>
            <option value="BA">Bahia</option>
            <option value="CE">Ceará</option>
            <option value="DF">Distrito Federal</option>
            <option value="ES">Espírito Santo</option>
            <option value="GO">Goiás</option>
            <option value="MA">Maranhão</option>
            <option value="MT">Mato Grosso</option>
            <option value="MS">Mato Grosso do Sul</option>
            <option value="MG">Minas Gerais </option>
            <option value="PA">Pará</option>
            <option value="PB">Paraíba</option>
            <option value="PR">Paraná</option>
            <option value="PE">Pernambuco</option>
            <option value="PI">Piauí</option>
            <option value="RJ">Rio de Janeiro</option>
            <option value="RN">Rio Grande do Norte</option>
            <option value="RS">Rio Grande do Su</option>
            <option value="RO">Rondônia</option>
            <option value="RR">Roraima</option>
            <option value="SC">Santa Catarina </option>
            <option value="SP">São Paulo</option>
            <option value="SE">Sergipe</option>
            <option value="TO">Tocantins</option>
        </select>
    </div><br>
    
    <div class="interesses">
        <h3>Hobbies e interesses</h3>
        <input type="checkbox" id="prog">
        <label for="prog">Programação</label><br>
        <input type="checkbox" id="ciber">
        <label for="ciber">Cibersegurança </label><br>
        <input type="checkbox" id="automa">
        <label for="automa">Automação</label><br>
        <input type="checkbox" id="ia">
        <label for="ia">Inteligência Artificial</label><br>
        <input type="checkbox" id="robo">
        <label for="robo">Robótica</label><br>
        <input type="checkbox" id="e-sports">
        <label for="e-sports">E-Sports ou Games</label><br>
        <input type="checkbox" id="edit">
        <label for="edit">Edição de Imagens</label><br>
        <input type="checkbox" id="music">
        <label for="music">Música</label><br>
        <input type="checkbox" id="leitura">
        <label for="leitura">Leitura</label><br>
        <input type="checkbox" id="empreend">
        <label for="empreend">Empreendedorismo Digital</label>
    </div><br>

    <div class="data">
        <label for="dob">Data de Nascimento: <br></label>
<input type="date" id="dob" name="dob">
    </div><br>

 
        <a href="home.html"><button>Enviar informações</button></a>

    

</body>
</html>
