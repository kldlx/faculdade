<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Menu Vertical com Dropdown</title>
  <style>
    /* Define a largura do menu lateral e a cor de fundo */
    .menu-vertical {
      width: 200px;              /* largura do menu vertical */
      background-color: #333;    /* cor de fundo escura */
      padding: 0;                /* sem espaçamento interno */
    }

    /* Estilo para todos os links do menu */
    .menu-vertical a, .dropbtn {
      display: block;            /* ocupa toda a largura disponível */
      color: white;              /* cor do texto */
      padding: 14px 20px;        /* espaçamento interno */
      text-decoration: none;     /* remove sublinhado */
      text-align: left;          /* alinha o texto à esquerda */
      border: none;              /* sem borda nos botões */
      background: none;          /* sem fundo adicional */
      font-size: 16px;           /* tamanho da fonte */
      font-family: inherit;      /* herda fonte padrão */
      cursor: pointer;           /* muda cursor para indicar clique */
    }

    /* Efeito de hover nos itens principais */
    .menu-vertical a:hover, .dropdown:hover .dropbtn {
      background-color: #575757; /* muda o fundo ao passar o mouse */
    }

    /* Container do dropdown */
    .dropdown {
      position: relative;        /* posicionamento relativo para conter o dropdown */
    }

    /* Itens do dropdown inicialmente escondidos */
    .dropdown-content {
      display: none;             /* começa oculto */
      background-color: #444;    /* cor de fundo para os itens do dropdown */
      position: relative;        /* permanece dentro do fluxo vertical */
    }

    /* Estilo para os links dentro do dropdown */
    .dropdown-content a {
      padding-left: 30px;        /* recuo para diferenciar visualmente */
      color: white;
    }

    /* Mostra os itens do dropdown ao passar o mouse */
    .dropdown:hover .dropdown-content {
      display: block;            /* exibe o menu suspenso */
    }
  </style>
</head>
<body>

  <div class="menu-vertical">
    <a href="#">Início</a>
    <a href="#">Sobre</a>

    <!-- Dropdown -->
    <div class="dropdown">
      <button class="dropbtn">Serviços ▾</button>
      <div class="dropdown-content">
        <a href="#">Design Gráfico</a>
        <a href="#">Desenvolvimento Web</a>
        <a href="#">Marketing</a>
      </div>
    </div>

    <a href="#">Contato</a>
  </div>

</body>
</html>
