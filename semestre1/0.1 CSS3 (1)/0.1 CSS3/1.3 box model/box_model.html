<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <!-- Box model
    - todas as tags html são caixas.
    - box model é a forma como o navegador renderiza as caixas.
    logo, todas as tags tem uma borda, um padding e uma margem.

    - padding: espaçamento interno entre o conteúdo e a borda.
    - border: borda da caixa.
    - margin: espaçamento externo entre a borda e o elemento vizinho.

    - perceba que o padding e a borda aumentam o tamanho da caixa.
    - o margin não aumenta o tamanho da caixa, mas sim o espaçamento entre as caixas.
    -tamanho da caixa = largura + padding + borda + margin
    -->
    <link rel="stylesheet" href="estilo.css" type="text/css">

</head>
