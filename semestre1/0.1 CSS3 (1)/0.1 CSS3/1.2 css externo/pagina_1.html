<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style type="text/css">
        /* Estilos para o arquivo CSS externo */
        .texto {
            font-size: 20px;
            color: #2980b9;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>CSS Externo</h1>
    <p>Esse é um exemplo de como usar CSS externo.</p>
    <p>O CSS externo é útil para manter o código HTML limpo e organizado.</p>
    <p>Você pode aplicar estilos a vários elementos HTML de uma só vez.</p>

    <h2>Página 1</h2>
    <p class="texto">Esse texto tem um estilo aplicado através de um arquivo CSS externo.</p>
    
</body>
</html>
