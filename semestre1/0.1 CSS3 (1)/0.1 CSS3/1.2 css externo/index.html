<!DOCTYPE html>
<!-- criar 3 paginas
 - mostrar o problema de usar o mesmo css internamente
 - mo css externo facilita a manutenção e a construção do site.
 
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <!-- CSS INTERNO
    <style type="text/css">

        /* Estilos para o arquivo CSS externo */
        .texto {
            font-size: 20px;
            color: #2980b9;
            font-weight: bold;
        }
    </style>
    -->
    <!-- CSS EXTERNO -->
    <link rel="stylesheet" href="estilo.css" type="text/css">

</head>
<body>
    <h1>CSS Externo</h1>
    <p>Esse é um exemplo de como usar CSS externo.</p>
    <p>O CSS externo é útil para manter o código HTML limpo e organizado.</p>
    <p>Você pode aplicar estilos a vários elementos HTML de uma só vez.</p>

    <h2>Página Principal</h2>
    <p class="texto">Esse texto tem um estilo aplicado através de um arquivo CSS externo.</p>
    
</body>
</html>
